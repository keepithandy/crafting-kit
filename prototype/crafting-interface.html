<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crafting Kit Prototype</title>
    <style>
      :root {
        color: #f7f2e8;
        background: #17120d;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        background:
          radial-gradient(circle at top left, rgba(206, 156, 83, 0.22), transparent 28rem),
          #17120d;
      }

      main {
        width: min(1080px, 100%);
        margin: 0 auto;
        padding: 1rem;
      }

      .hero,
      .panel,
      .recipe-card,
      .result-card {
        border: 1px solid rgba(244, 211, 157, 0.18);
        border-radius: 1rem;
        background: rgba(43, 31, 22, 0.86);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.24);
      }

      .hero,
      .panel {
        padding: 1rem;
      }

      .hero {
        margin-bottom: 1rem;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 0.5rem;
        font-size: clamp(2rem, 8vw, 4rem);
        line-height: 0.95;
      }

      p {
        color: #cdbb9f;
        line-height: 1.6;
      }

      .layout {
        display: grid;
        gap: 1rem;
      }

      .recipe-grid,
      .inventory-grid {
        display: grid;
        gap: 0.75rem;
      }

      .recipe-card,
      .result-card {
        padding: 0.9rem;
      }

      .recipe-card {
        width: 100%;
        color: inherit;
        text-align: left;
        cursor: pointer;
      }

      .recipe-card.selected {
        border-color: rgba(244, 211, 157, 0.65);
        background: rgba(106, 78, 42, 0.72);
      }

      .pill {
        display: inline-flex;
        border: 1px solid rgba(244, 211, 157, 0.2);
        border-radius: 999px;
        padding: 0.25rem 0.55rem;
        color: #f4d39d;
        font-size: 0.75rem;
        font-weight: 800;
      }

      button {
        min-height: 2.8rem;
        border: 1px solid rgba(244, 211, 157, 0.4);
        border-radius: 0.85rem;
        color: #f7f2e8;
        background: rgba(244, 211, 157, 0.1);
        font: inherit;
        font-weight: 800;
      }

      .blocked {
        color: #fca5a5;
      }

      .ok {
        color: #86efac;
      }

      @media (min-width: 760px) {
        main {
          padding: 2rem;
        }

        .layout {
          grid-template-columns: 1.2fr 0.8fr;
          align-items: start;
        }

        .recipe-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <span class="pill">Mock prototype</span>
        <h1>Crafting Kit Interface Prototype</h1>
        <p>
          Browser-only test surface for recipe selection, material checks, craft blocked states,
          and result preview. No backend or persistence.
        </p>
      </section>

      <section class="layout">
        <section class="panel">
          <h2>Recipes</h2>
          <div class="recipe-grid" id="recipeGrid"></div>
        </section>

        <section class="panel">
          <h2>Inventory</h2>
          <div class="inventory-grid" id="inventoryGrid"></div>
          <div class="result-card" id="resultCard"></div>
        </section>
      </section>
    </main>

    <script>
      const inventory = {
        iron_ore: 3,
        coal: 1,
        wild_herb: 1,
        water_vial: 1,
        cloth_scrap: 4,
        thread: 2
      };

      const recipes = [
        {
          id: "iron_ingot_from_ore",
          name: "Smelt Iron Ingot",
          profession: "Blacksmithing",
          inputs: [
            ["iron_ore", 3],
            ["coal", 1]
          ],
          output: "iron_ingot"
        },
        {
          id: "brew_healing_potion",
          name: "Brew Healing Potion",
          profession: "Alchemy",
          inputs: [
            ["wild_herb", 2],
            ["water_vial", 1]
          ],
          output: "healing_potion"
        },
        {
          id: "stitch_simple_cloak",
          name: "Stitch Simple Cloak",
          profession: "Tailoring",
          inputs: [
            ["cloth_scrap", 4],
            ["thread", 2]
          ],
          output: "simple_cloak"
        }
      ];

      let selectedRecipe = recipes[0];

      function canCraft(recipe) {
        return recipe.inputs.every(([itemId, quantity]) => (inventory[itemId] || 0) >= quantity);
      }

      function renderRecipes() {
        const grid = document.getElementById("recipeGrid");
        grid.innerHTML = "";

        recipes.forEach((recipe) => {
          const button = document.createElement("button");
          button.className = `recipe-card ${recipe.id === selectedRecipe.id ? "selected" : ""}`;
          button.innerHTML = `
            <span class="pill">${recipe.profession}</span>
            <h3>${recipe.name}</h3>
            <p>${recipe.inputs.map(([itemId, quantity]) => `${quantity} ${itemId}`).join(", ")}</p>
            <strong class="${canCraft(recipe) ? "ok" : "blocked"}">
              ${canCraft(recipe) ? "Craftable" : "Blocked: missing materials"}
            </strong>
          `;
          button.addEventListener("click", () => {
            selectedRecipe = recipe;
            render();
          });
          grid.appendChild(button);
        });
      }

      function renderInventory() {
        const grid = document.getElementById("inventoryGrid");
        grid.innerHTML = Object.entries(inventory)
          .map(([itemId, quantity]) => `<div class="recipe-card"><strong>${itemId}</strong><p>${quantity} available</p></div>`)
          .join("");
      }

      function renderResult() {
        const result = document.getElementById("resultCard");
        const ok = canCraft(selectedRecipe);
        result.innerHTML = `
          <h3>${selectedRecipe.name}</h3>
          <p>Output preview: ${selectedRecipe.output}</p>
          <button type="button">${ok ? "Craft preview ready" : "Craft blocked"}</button>
          <p class="${ok ? "ok" : "blocked"}">
            ${ok ? "All required materials are present." : "One or more required materials are missing."}
          </p>
        `;
      }

      function render() {
        renderRecipes();
        renderInventory();
        renderResult();
      }

      render();
    </script>
  </body>
</html>
